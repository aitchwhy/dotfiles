# Project-scoped Codex config for the dotfiles repo.
#
# Discovered by Codex when cwd is inside this repo. Merges over the global
# ~/.codex-max-N/config.toml (generated by Nix from
# config/quality/generated/codex/config.toml).
#
# Sandbox + approval defaults are deliberately conservative — the dotfiles
# repo configures the system; mistakes are expensive.
#
# Source of truth for these values: config/quality/docs/adr/015-codex-harness-port.md

sandbox_mode = "workspace-write"
approval_policy = "on-request"

[sandbox_workspace_write]
network_access = false
exclude_slash_tmp = false
