# vulnix whitelist — entries here suppress false-positive CVE matches.
#
# Auto-generated patterns cover three classes of NVD name collisions:
#   1. Bootstrap toolchains (build-time only, never on runtime PATH)
#   2. Haskell/Cabal ecosystem packages (e.g., curl@0.4.49 is the Haskell
#      curl binding, not the C curl CLI)
#   3. VS Code extension CVEs that NVD ascribes to the upstream tool name
#      (e.g., CVE-2021-28794 affects the unofficial ShellCheck VS Code
#      extension, not the ShellCheck Haskell CLI)
#
# Add new entries below when audit triage surfaces additional false matches.
# Format reference: https://github.com/flyingcircusio/vulnix#whitelist

[[whitelist]]
name    = "Diff"
version = "1.0.2"
cve     = ["CVE-2024-13278"]
comment = "Haskell/Cabal ecosystem package; not the C/system equivalent NVD references"

